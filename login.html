<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="styletrace.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body class="body">

    <div class="login-interface">
        <div class="image-section">
            <img src="your-illustration.png" alt="Phanero Travel Tracker" class="image1">
        </div>

        <div class="header-text">
            <h2>Log In</h2>
            <p>Log in to Continue</p>
        </div>


        <form class="login-form">

            <div class="input-value">
                <label for="email">Email/Username</label>
                <div class="input1">
                    <input type="text" id="email" placeholder="Enter Email /Username">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>
            </div>

            <div class="input-value">
                <label for="password">Password</label>
                <div class="input1">
                    <input type="password" id="password" value="••••••••">
                    <i class="fa-solid fa-eye-slash input-icon"></i>
                </div>
            </div>

            <div class="forgot-password">
                <a href="forgot-password.html" class="forgot-password2">Forgot Password?</a>
            </div>

            <button type="submit" class="login-button">Log In</button>

        </form>

        <p class="signup-text">If you don't have account ! <a href="#">Create Account</a></p>



    </div>
</body>

</html>
